<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夏至 - 竖直排列</title>
    <style>
        body{
            margin:0px;
            height:100vh;
            background-color: #ffffff;
        }
        .flex{
            display: flex;
        }
        .side-area{
            width:80px;
            background-color: rgb(255, 255, 255);
        }
        .main-area{
            background-color: rgb(240, 240, 240);
            flex:1;
            display: flex;
            flex-direction: column;
        }
        .head{
            height:60px;
            background-color: #a89e9e;
            display: flex;
            align-items: center;
            padding-left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        .content{
            display: flex;
            flex-direction: column; /* 关键修改：设置为垂直方向 */
            justify-content: center;
            align-items: center; /* 水平居中 */
            flex: 1;
            padding: 20px;
            gap: 20px; /* 添加间距 */
            margin-top: 50px;
        }
        .picture{
            width: 600px;
            height: auto;
            border: 1px solid #ccc;
            border-radius: 8px;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #555;
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }
        .footer {
            height: 40px;
            background-color: #a89e9e;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
            font-size: 14px;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
        }
    </style>
</head>
<body class="flex">
    <div class="side-area">
        <!-- 侧边栏内容 -->
    </div>
    <div class="main-area">
        <div class="head">
            <p style="margin: 0px;">夏至</p>
        </div>
        <div class="content">
            <div class="picture">
                <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80" alt="夏至图片1">
            </div>
            <div class="picture">
                <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80" alt="夏至图片2">
            </div>
        </div>
        <div class="footer">
            夏至 - 一年中白昼最长的一天
        </div>
    </div>
</body>
</html>
